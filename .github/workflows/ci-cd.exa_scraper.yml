name: "🕸️ Agent - Execute Semantic Search Scraper"

# Define triggering mechanisms for automated lifecycle management
on:
  # manual trigger workflow
  workflow_dispatch:
    
  # allow other workflow call into (inputs same as workflow_dispatch but required)
  workflow_call:
    
# Enforce secure concurrency policies to prevent race conditions during artifact generation
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# permissions for GitHub Actions READ/WRITE
permissions:
  contents: write
  packages: write

# enviroment
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  LANG: 'C.UTF-8'
  LC_ALL: 'C.UTF-8'

jobs:
  run-search-pipeline:
    name: "🤖 AI Semantic Search Data Ingestion"
    runs-on: ubuntu-latest

    steps:
      # Step 1: Initialize workspace by cloning the target branch repository
      - name: "📂 Checkout code repository workspace"
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_SECRETS_MANAGER }}     # use personal access token `PAT` to for main workflow triggering by batch script parallel multi agents
      
      # Step 1.1: clean-up old files
      - name: 🗑️ Find and remove expired files
        env:
          EXPIRED_DAYS: 5
          FILE_NAME: "web_search_corpus"
        run: |
          TARGET_DIR="sources/output"
          
          echo "=== Scan for cleaning up expired output files: $TARGET_DIR ==="
          
          # not found folder; ignore
          if [ ! -d "$TARGET_DIR" ]; then
            echo "⚠️ Not found directory $TARGET_DIR for cleaning up."
            exit 0
          fi
          
          # 2. List deleted files for tracing
          echo "Expired Files (> $EXPIRED_DAYS days):"
          find "$TARGET_DIR" -type f -name "*-$FILE_NAME.json" -mtime +$EXPIRED_DAYS -print
          find "$TARGET_DIR" -type f -name "*-$FILE_NAME.md" -mtime +$EXPIRED_DAYS -print
          
          # 3. Delete expired files
          # use -exec rm -f {} + to remove all expired files
          find "$TARGET_DIR" -type f -name "*-$FILE_NAME.json" -mtime +$EXPIRED_DAYS -exec rm -f {} +
          find "$TARGET_DIR" -type f -name "*-$FILE_NAME.md" -mtime +$EXPIRED_DAYS -exec rm -f {} +
          
          echo "=== Finish Cleaning up ==="

      # Step 2: Establish a secure, isolated Python virtual execution environment
      - name: "⚙️ Configure Python runtime execution platform"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip" # Opt-in to dependency caching to optimize subsequent build duration

      # Step 3: Upgrade pip binary interfaces and securely bind external libraries
      - name: "🛠️ Install operational dependencies"
        run: |
          echo "🔥 Upgrading package managers and resolving required core modules..."
          python -m pip install --upgrade pip
          pip install exa_py

      # Step 4: Inject encrypted credentials from repository vault and trigger ingestion core
      - name: "🤖 Execute multi-source semantic web discovery pipeline"
        env:
          # Secure ingestion of the private API Key configuration from GitHub Secrets manager
          API_KEY_EXA: ${{ secrets.API_KEY_EXA }}
        run: |
          # Validate token existence to prevent runtime authentication failures
          if [ -z "$API_KEY_EXA" ]; then
            echo "::error::🚨 CRITICAL INFRASTRUCTURE FAILURE: API_KEY_EXA secret token identifier is missing from repository vault."
            exit 1
          fi
          echo "🧠 AI Ingestion Agent successfully authenticated. Booting semantic web discovery matrix..."
          python sources/agents/ai-semantic-search-scapper.py --exa-api-key "$API_KEY_EXA"
          echo "✅ Massive parallel data extraction process completed successfully!"
          
      # Step 5: Dynamically organize directory, rename file by system date, and commit changes
      - name: "🚀 Commit and Push structured data to repository storage"
        env:
          FILE_NAME: "web_search_corpus"
        run: |
          TARGET_DIR="sources/output"
          # Prevent pipeline block execution if the target output file was not generated
          if [ -f "${TARGET_DIR}/$FILE_NAME.json" ]; then
            echo "📅 Fetching current system timestamp..."
            # Generate current date in YYYY-MM-DD format
            CURRENT_DATE=$(date +'%Y-%m-%d')
            
            echo "📁 Ensuring target destination directory exists..."
            mkdir -p $TARGET_DIR
            
            echo "📝 Relocating and renaming output payload to ${TARGET_DIR}/${CURRENT_DATE}.json"
            mv sources/output/$FILE_NAME.json "${TARGET_DIR}/${CURRENT_DATE}-$FILE_NAME.json"
            if [ -f "${TARGET_DIR}/$FILE_NAME.md" ]; then
              mv sources/output/$FILE_NAME.md "${TARGET_DIR}/${CURRENT_DATE}-$FILE_NAME.md"
            fi
            
            echo "🔧 Configuring automated Git bot profile identity..."
            git config --local user.email "github-actions[bot]@://github.com"
            git config --local user.name "github-actions[bot]"
            
            echo "💾 Staging modified file vectors..."
            git add "${TARGET_DIR}/${CURRENT_DATE}-$FILE_NAME.json"
            if [ -f "${TARGET_DIR}/${CURRENT_DATE}-$FILE_NAME.md" ]; then
              git add "${TARGET_DIR}/${CURRENT_DATE}-$FILE_NAME.md"
            fi
          
          else
            echo "::warn::⚠️ CRITICAL WARN: The scraper output payload '${TARGET_DIR}/$FILE_NAME.json' is missing."
          fi
          
          # Only commit if there are explicit architectural diff changes detected
          if git diff --cached --quiet; then
              echo "⚠️ Operational Notice: No data state changes detected. Skipping repository commit."
          else
              echo "📝 Committing system state changes..."
              git commit -m "🚀 data: Auto-ingest semantic corpus update [${CURRENT_DATE}]"
              
              # ✅ ENTERPRISE HOTFIX: Explicitly pull and rebase the remote branch directly into the working tree
              echo "🔄 Fetching latest upstream tree and executing explicit contextual rebase..."
              git fetch origin ${{ github.ref_name }}
              git rebase origin/${{ github.ref_name }}
              
              echo "📤 Pushing secure data changes upstream to repository branch..."
              git push origin HEAD:${{ github.ref }}
              echo "🎉 Workspace data pipeline successfully persistent!"
          fi
