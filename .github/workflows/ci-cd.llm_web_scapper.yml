name: "🤖 Agent - Execute AI Web Scraper"

# Define triggering mechanisms for automated lifecycle management
on:
  # manual trigger workflow
  workflow_dispatch:
    
  # allow other workflow call into (inputs same as workflow_dispatch but required)
  workflow_call:
    
  schedule:
    - cron: "0 0 * * 0" # every Sunday at 0:00

# Enforce secure concurrency policies to prevent race conditions during artifact generation
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# permissions for GitHub Actions READ/WRITE
permissions:
  contents: write
  packages: write

# enviroment
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  LANG: 'C.UTF-8'
  LC_ALL: 'C.UTF-8'

jobs:
  run-ai-agent-pipeline:
    name: "🧠 LLM-Driven Autonomous Web Scraping"
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Initialize workspace by cloning the target branch repository
      - name: "📂 Checkout code repository workspace"
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_SECRETS_MANAGER }}     # use personal access token `PAT` to for main workflow triggering by batch script parallel multi agents

      # Step 2: Establish a secure, isolated Python virtual execution environment
      - name: "⚙️ Configure Python runtime execution platform"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # Step 3: Install ScrapeGraphAI framework modules and headless browser binaries
      - name: "🛠️ Install AI Framework and Playwright browsers"
        run: |
          echo "🔥 Installing ScrapeGraphAI core engine and system dependencies..."
          python -m pip install --upgrade pip
          
          # ✅ ENTERPRISE ATTRIBUTE: Consolidated core libraries required for the dynamic OpenAI client architecture
          pip install openai beautifulsoup4 requests

      - name: "🤖 Launch AI Agent extraction graph instance"
        env:
          # Match the variable name with your execution script configuration env variables
          API_KEY: ${{ secrets.API_KEY }}
          API_ENDPONT: ${{ secrets.API_ENDPOINT }}
          API_MODEL: ${{ secrets.API_MODEL }}
        run: |
          if [ -z "$API_KEY" -o -z "$API_ENDPONT" -o -z "$API_MODEL" ]; then
            echo "::error::🚨 CRITICAL SECURITY FAILURE: API_KEY, API_ENDPOINT, API_MODEL secret tokens is missing from vault."
            exit 1
          fi
          
          # 🩹 ENTERPRISE MONKEY PATCH: Fix broken nested import inside scrapegraphai core library dynamically
          SITE_PACKAGES_DIR=$(python -c "import site; print(site.getsitepackages()[0])")
          TARGET_INIT_FILE="$SITE_PACKAGES_DIR/langchain_community/chat_models/__init__.py"
          
          echo "Injecting hotfix routing directly into: $TARGET_INIT_FILE"
          if [ -f "$TARGET_INIT_FILE" ]; then
              # Append the redirection pointer safely to bypass the internal library crash line
              echo -e "\nfrom langchain_ollama import ChatOllama" >> "$TARGET_INIT_FILE"
              echo "✅ Hotfix dynamically applied to langchain infrastructure successfully."
          else
              echo "⚠️ Target initialization file path not discovered. Skipping hotfix injection."
          fi
          
          echo "🧠 AI Agent successfully initialized. Booting extraction graph workflow..."
          # Execute the enterprise script payload safely passing the verified API key parameters
          python sources/agents/ai-llm-web-scapper.py --api-key "$API_KEY" --api-endpoint "$API_ENDPONT" --api-model "$API_MODEL"
          echo "✅ AI parsing complete. Extraction graph closed successfully."

      # Step 5: Dynamically organize directory, rename file by system date, and commit changes
      - name: "🚀 Commit and Push structured data to repository storage"
        env:
          FILE_NAME: "free_models_by_llm_web_scapper"
        run: |
          TARGET_DIR="sources/output"
          # Prevent pipeline block execution if the target output file was not generated
          if [ ! -f "${TARGET_DIR}/$FILE_NAME.json" ]; then
              echo "::error::🚨 CRITICAL FAILURE: The scraper output payload '${TARGET_DIR}/$FILE_NAME' is missing."
              exit 1
          fi
          
          echo "📅 Fetching current system timestamp..."
          # Generate current date in YYYY-MM-DD format
          CURRENT_DATE=$(date +'%Y-%m-%d')
          
          echo "📁 Ensuring target destination directory exists..."
          mkdir -p $TARGET_DIR
          
          echo "📝 Relocating and renaming output payload to ${TARGET_DIR}/${CURRENT_DATE}.json"
          mv sources/output/$FILE_NAME.json "${TARGET_DIR}/${CURRENT_DATE}-$FILE_NAME.json"
          
          echo "🔧 Configuring automated Git bot profile identity..."
          git config --local user.email "github-actions[bot]@://github.com"
          git config --local user.name "github-actions[bot]"
          
          echo "💾 Staging modified file vectors..."
          git add "${TARGET_DIR}/${CURRENT_DATE}-$FILE_NAME.json"
          
          # Only commit if there are explicit architectural diff changes detected
          if git diff --cached --quiet; then
              echo "⚠️ Operational Notice: No data state changes detected. Skipping repository commit."
          else
              echo "📝 Committing system state changes..."
              git commit -m "🚀 data: Auto-ingest semantic corpus update [${CURRENT_DATE}]"
              echo "📤 Pushing secure data changes upstream to repository branch..."
              git push origin HEAD:${{ github.ref }}
              echo "🎉 Workspace data pipeline successfully persistent!"
          fi
