name: "👑 AI Agents Enterprise Orchestrator Matrix"

# Define flexible runtime triggering topologies for centralized multi-agent execution
on:
  workflow_dispatch:
    inputs:
      agent_selection:
        description: "🤖 Select Target Execution Component"
        required: true
        default: "All"
        type: choice
        options:
          - "All"
          - "🕸️ Semantic Search Scraper"
          - "🕵️ Hacker News Tech Monitor"
          - "🐙 GitHub Repository Scraper"
          - "🤖 AI Web Scraper"
      scan_limit_default:
        description: "🕵️ Sequence parsing scan limit (For Forum/Repo Agents)"
        required: true
        default: 50
        type: number

# Ensure system telemetry prevents dirty workspace overlapping states
concurrency:
  group: matrix-orchestrator-lock
  cancel-in-progress: false

# permissions for GitHub Actions READ/WRITE
permissions:
  actions: write
  contents: write
  packages: write

# enviroment
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  LANG: 'C.UTF-8'
  LC_ALL: 'C.UTF-8'

jobs:
  # ==============================================================================
  # JOB 1: AUTOMATED ROUTING ENGINE FOR EXA SEMANTIC SEARCH AGENT
  # ==============================================================================
  trigger-exa-agent:
    name: "🕸 Trigger 👉 Semantic Search Scraper"
    runs-on: ubuntu-latest
    permissions:
      actions: write
    # Execute only if the master configuration selection matches the current node driver route
    if: ${{ github.event.inputs.agent_selection == 'All' || github.event.inputs.agent_selection == '🕸️ Semantic Search Scraper' }}
    steps:
      - name: "📂 Checkout workspace root repository"
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: "📡 Dispatch Upstream Signal to Exa Agent"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Initiating execution trigger for Exa Semantic Search Scraper Pipeline..."
          gh workflow run "🕸️ Agent - Execute Semantic Search Scraper" --repo "${{ github.repository }}" --ref "${{ github.ref_name }}"
          echo "✅ Signal transmitted successfully."

  # ==============================================================================
  # JOB 2: AUTOMATED ROUTING ENGINE FOR HACKER NEWS MONITOR AGENT
  # ==============================================================================
  trigger-hn-agent:
    name: "🕵️ Trigger 👉 Hacker News Tech Monitor"
    runs-on: ubuntu-latest
    permissions:
      actions: write
    if: ${{ github.event.inputs.agent_selection == 'All' || github.event.inputs.agent_selection == '🕵️ Hacker News Tech Monitor' }}
    steps:
      - name: "📂 Checkout workspace root repository"
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: "📡 Dispatch Upstream Signal with Custom Scan Limit Input Data"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIMIT: ${{ github.event.inputs.scan_limit_default }}
        run: |
          echo "Initiating execution trigger for Hacker News Forum Stream Analyzer Node..."
          # ✅ CORRECTED: Explicitly bind the input parameter using the -f (field) operational option flag
          gh workflow run "🕵️ Agent - Execute Hacker News Tech Monitor" --repo "${{ github.repository }}" --ref "${{ github.ref_name }}" -f scan_limit="$LIMIT"
          echo "✅ Signal containing injection payload transmitted successfully."

  # ==============================================================================
  # JOB 3: AUTOMATED ROUTING ENGINE FOR GITHUB REPOSITORY SCRAPER AGENT
  # ==============================================================================
  trigger-github-agent:
    name: "🐙 Trigger 👉 GitHub Repository Scraper"
    runs-on: ubuntu-latest
    permissions:
      actions: write
    if: ${{ github.event.inputs.agent_selection == 'All' || github.event.inputs.agent_selection == '🐙 GitHub Repository Scraper' }}
    steps:
      - name: "📂 Checkout workspace root repository"
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: "📡 Dispatch Upstream Signal to GitHub Scraper Agent"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Initiating execution trigger for Open-Source Repository Discovery Pipeline..."
          gh workflow run "🐙 Agent - Execute GitHub Repository Scraper" --repo "${{ github.repository }}" --ref "${{ github.ref_name }}"
          echo "✅ Signal transmitted successfully."

  # ==============================================================================
  # JOB 4: AUTOMATED ROUTING ENGINE FOR AI WEB SCRAPER LLM AGENT
  # ==============================================================================
  trigger-ai-web-agent:
    name: "🤖 Trigger 👉 AI Web Scraper"
    runs-on: ubuntu-latest
    permissions:
      actions: write
    if: ${{ github.event.inputs.agent_selection == 'All' || github.event.inputs.agent_selection == '🤖 AI Web Scraper' }}
    steps:
      - name: "📂 Checkout workspace root repository"
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: "📡 Dispatch Upstream Signal to Autonomous LLM Graph Agent"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Initiating execution trigger for Autonomous LLM Graph Web Scraper Engine..."
          gh workflow run "🤖 Agent - Execute AI Web Scraper" --repo "${{ github.repository }}" --ref "${{ github.ref_name }}"
          echo "✅ Signal transmitted successfully."
