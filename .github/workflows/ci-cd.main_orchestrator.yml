name: "👑 AI Agents Enterprise Orchestrator Matrix"

# Define flexible runtime triggering topologies for centralized multi-agent execution
on:
  workflow_dispatch:
    inputs:
      agent_selection:
        description: "🤖 Select Target Execution Component"
        required: true
        default: "All"
        type: choice
        options:
          - "All"
          - "🕸️ Semantic Search Scraper"
          - "🕵️ Hacker News Tech Monitor"
          - "🐙 GitHub Repository Scraper"
          - "🤖 AI Web Scraper"
      scan_limit_default:
        description: "🕵️ Sequence parsing scan limit (For Forum/Repo Agents)"
        required: true
        default: 50
        type: number

# Ensure system telemetry prevents dirty workspace overlapping states
concurrency:
  group: matrix-orchestrator-lock
  cancel-in-progress: false

# permissions for GitHub Actions READ/WRITE
permissions:
  contents: write
  packages: write

# enviroment
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  LANG: 'C.UTF-8'
  LC_ALL: 'C.UTF-8'

jobs:
  # ==============================================================================
  # JOB 1: AUTOMATED ORCHESTRATION PIPELINE MATRIX ENGINE
  # ==============================================================================
  orchestrate-agents:
    name: "🚀 Triggering Selected Infrastructure Components"
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      actions: write

    steps:
      # Step 1: Initialize code space workspace environment
      - name: "📂 Checkout workspace root repository"
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Step 2: Dynamically parse variables and evaluate dispatch matrix routes
      - name: "⚙️ Dispatching targeted upstream workflow signals"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SELECTION: ${{ github.event.inputs.agent_selection }}
          LIMIT: ${{ github.event.inputs.scan_limit_default }}
        run: |
          echo "🌐 Initiating core routing controller matrix layer..."
          CURRENT_REPO="${{ github.repository }}"
          TARGET_BRANCH="${{ github.ref_name }}"
          
          # Implementation of centralized switch routing logic matching business selections
          if [ "$SELECTION" = "All" ] || [ "$SELECTION" = "🕸️ Semantic Search Scraper" ]; then
            echo "📡 Activating: Exa AI Semantic Search Ingestion Node..."
            gh workflow run "Execute Semantic Search Scraper" --repo "$CURRENT_REPO" --ref "$TARGET_BRANCH"
          fi
          
          if [ "$SELECTION" = "All" ] || [ "$SELECTION" = "🕵️ Hacker News Tech Monitor" ]; then
            echo "📡 Activating: Hacker News Real-Time Forum Stream Listener..."
            gh workflow run "Execute Hacker News Tech Monitor" --repo "$CURRENT_REPO" --ref "$TARGET_BRANCH" -f scan_limit="$LIMIT"
          fi
          
          if [ "$SELECTION" = "All" ] || [ "$SELECTION" = "🐙 GitHub Repository Scraper" ]; then
            echo "📡 Activating: GitHub Open-Source Discovery Pipeline..."
            gh workflow run "Execute GitHub Repository Scraper" --repo "$CURRENT_REPO" --ref "$TARGET_BRANCH"
          fi
          
          if [ "$SELECTION" = "All" ] || [ "$SELECTION" = "🤖 AI Web Scraper" ]; then
            echo "📡 Activating: Autonomous LLM Graph Web Scraper Agent..."
            gh workflow run "Execute AI Web Scraper Agent" --repo "$CURRENT_REPO" --ref "$TARGET_BRANCH"
          fi
          
          echo "🏆 All targeted agent workflow tasks successfully dispatched upstream!"
